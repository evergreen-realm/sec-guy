version: "3.8"

services:
  secguy:
    build: .
    container_name: secguy-main
    privileged: true
    volumes:
      - ./data:/opt/sec-guy/data
      - ./config:/opt/sec-guy/config
      - ./logs:/opt/sec-guy/logs
      - /dev/shm/secguy-vault:/dev/shm/secguy-vault
    environment:
      - SECGUY_CONFIG=/opt/sec-guy/config/secguy.yaml
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      - neo4j
      - redis
    networks:
      - secguy-net

  neo4j:
    image: neo4j:5.19-community
    container_name: secguy-neo4j
    environment:
      - NEO4J_AUTH=neo4j/secguy_neo4j_2025
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    networks:
      - secguy-net

  redis:
    image: redis:7-alpine
    container_name: secguy-redis
    ports:
      - "6379:6379"
    networks:
      - secguy-net

  prometheus:
    image: prom/prometheus:latest
    container_name: secguy-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - secguy-net

volumes:
  neo4j-data:

networks:
  secguy-net:
    driver: bridge
